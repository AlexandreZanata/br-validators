blank_issues_enabled: false
contact_links:
  - name: Bug report
    url: https://github.com/AlexandreZanata/br-validators/issues/new?template=bug_report.yml
    about: Incorrect validation, formatting, or library behavior
  - name: Data source alert
    url: https://github.com/AlexandreZanata/br-validators/issues/new?template=data_source.yml
    about: Broken or moved official endpoint (data refresh bot / CRITICAL-ALERTS)
  - name: ISS municipal rate contribution (good first issue)
    url: https://github.com/AlexandreZanata/br-validators/issues/new?template=iss-municipal-contribution.yml
    about: Cite municipal ISS legislation — see docs/COVERAGE-GAPS.md
  - name: RG DV algorithm upgrade (good first issue)
    url: https://github.com/AlexandreZanata/br-validators/issues/new?template=rg-dv-upgrade.yml
    about: Official SSP/IGP check-digit walkthrough for a format-only UF
  - name: Feature request
    url: https://github.com/AlexandreZanata/br-validators/issues/new?template=feature_request.yml
    about: New validator, dataset, or public API — check ROADMAP first
  - name: Coverage gaps index
    url: https://github.com/AlexandreZanata/br-validators/blob/main/docs/COVERAGE-GAPS.md
    about: Municipalities without ISS embed, estimation-only rows, RG DV gaps
  - name: Documentation site
    url: https://github.com/AlexandreZanata/br-validators/tree/main/apps/docs
    about: VitePress docs — API synced from docs/LIBRARY-API.md
